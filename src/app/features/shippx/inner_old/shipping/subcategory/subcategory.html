<div class="container py-5">
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-link text-dark p-0 me-3" (click)="goBack()">
      <i class="fa fa-arrow-left fs-4"></i>
    </button>
    <div>
      <h2 class="fw-bold mb-0">Selecione o tipo de item</h2>
      <p class="text-muted mb-0">Especifique o que você está enviando nesta categoria.</p>
    </div>
  </div>

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>
  } @else {
    <div class="row g-4">
      @for (sub of subCategories(); track sub.id) {
        <div class="col-6 col-md-4 col-lg-3">
          <div class="category-card shadow-sm" (click)="selectSubCategory(sub.id)">
            <div class="card-content text-center">
              <div class="icon-container mb-3">
                <img [src]="sub.icon_url" [alt]="sub.name" class="img-fluid category-icon">
              </div>
              <h5 class="category-title">{{ sub.name }}</h5>
              <div class="hover-indicator">
                 <i class="fa fa-plus"></i>
              </div>
            </div>
          </div>
        </div>
      } @empty {
        <div class="col-12 text-center py-5">
          <p class="text-muted">Nenhuma subcategoria encontrada para esta seleção.</p>
          <button class="btn btn-primary" (click)="goBack()">Voltar</button>
        </div>
      }
    </div>
  }
</div>
