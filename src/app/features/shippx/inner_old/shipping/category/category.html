<div class="container py-5">
  <div class="header-section text-center mb-5">
    <h2 class="fw-bold display-6">O que você deseja enviar?</h2>
    <p class="text-muted fs-5">Selecione uma categoria para iniciar sua remessa na plataforma Andromedra.</p>
  </div>

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Carregando categorias...</p>
    </div>
  } @else {
    <div class="row g-4 justify-content-center">
      @for (cat of categories(); track cat.id) {
        <div class="col-6 col-md-4 col-lg-3">
          <div class="category-card shadow-sm" (click)="selectCategory(cat.id)">
            <div class="card-content">
              <div class="icon-container mb-3">
                <img [src]="cat.icon_url" [alt]="cat.name" class="img-fluid">
              </div>
              <h5 class="category-title">{{ cat.name }}</h5>
              <p class="text-muted small mb-0">{{ cat.description }}</p>
              <div class="hover-indicator">
                 <i class="fa fa-arrow-right"></i>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  }

  @if (errorMessage()) {
    <div class="alert alert-danger mt-4 text-center border-0 shadow-sm">
      {{ errorMessage() }}
    </div>
  }
</div>
