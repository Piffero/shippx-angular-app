<div class="container py-4">
  <div class="row justify-content-center">
    <div class="alert alert-dismissible fade show" [ngClass]="messageCss()" role="alert">
        <strong>Resposta do Sistema!</strong> {{messageEvent()}}
    </div>
    <div class="col-lg-10">
      <div class="card border-0 shadow-sm p-4">
        <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-truck me-2"></i> Perfil do Transportador</h4>
        
        <form (ngSubmit)="saveDetails()">
          <div class="mb-4">
            <label class="form-label fw-bold text-muted small text-uppercase">Sobre sua Operação</label>
            <textarea class="form-control" [(ngModel)]="details.company_description" name="description" 
              rows="4" placeholder="Conte aos clientes sobre sua experiência e frota..."></textarea>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <div class="p-3 border rounded bg-light">
                <label class="form-label fw-bold small text-uppercase">Identificação Profissional</label>
                <div class="mb-2">
                  <input type="text" class="form-control mb-2" [(ngModel)]="details.dot_number" name="dot" placeholder="Número DOT">
                  <input type="text" class="form-control" [(ngModel)]="details.mc_number" name="mc" placeholder="Número MC">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="p-3 border rounded bg-light">
                <label class="form-label fw-bold small text-uppercase">Informações da Frota</label>
                <div class="d-flex align-items-center gap-2 mb-2">
                  <input type="number" class="form-control" [(ngModel)]="details.fleet_info.total_vehicles" name="total_v" placeholder="Qtd. Veículos">
                </div>
                <select class="form-select" multiple [(ngModel)]="details.fleet_info.types" name="types">
                  <option value="Reboque Aberto">Reboque Aberto</option>
                  <option value="Baú Fechado">Baú Fechado</option>
                  <option value="Cegonha">Cegonha</option>
                  <option value="Prancha">Prancha</option>
                </select>
                <small class="text-muted">Segure Ctrl para selecionar vários.</small>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 border-top pt-3">
            <button type="button" class="btn btn-light px-4">Cancelar</button>
            <button type="submit" class="btn btn-primary px-5 fw-bold" [disabled]="saving()">
              {{ saving() ? 'Salvando...' : 'Salvar Perfil Profissional' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
