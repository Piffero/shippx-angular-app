<div class="integration-panel">
  <div class="mb-4">
    <h5 class="fw-bold">Integrações de Marketplace</h5>
    <p class="text-muted small">Conecte suas lojas para sincronizar pedidos e gerar etiquetas ShippX automaticamente.</p>
  </div>

  <div class="row g-3">
    @for (mp of marketplaces(); track mp.id) {
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 border-0 shadow-sm transition-hover">
          <div class="card-body d-flex flex-column align-items-center p-4">
            
            <div class="logo-container mb-3 d-flex align-items-center justify-content-center">
              <img [src]="mp.logo" [alt]="mp.name" class="img-fluid marketplace-logo">
            </div>

            <h6 class="fw-bold mb-1">{{ mp.name }}</h6>
            
            @if (mp.connected) {
              <span class="badge bg-success-subtle text-success border border-success-subtle mb-3">
                <i class="bi bi-check-circle-fill me-1"></i> Conectado
              </span>
            } @else {
              <span class="badge bg-light text-muted border mb-3">Não configurado</span>
            }

            <div class="mt-auto w-100">
              @if (mp.connected) {
                <div class="d-grid gap-2">
                  <button class="btn btn-outline-secondary btn-sm" (click)="connect(mp.id)">
                    Configurar API
                  </button>
                  <button class="btn btn-link btn-sm text-danger text-decoration-none" (click)="disconnect(mp.id)">
                    Desconectar
                  </button>
                </div>
              } @else {
                <button class="btn btn-primary btn-sm w-100" (click)="connect(mp.id)">
                  Conectar Agora
                </button>
              }
            </div>

          </div>
        </div>
      </div>
    }
  </div>
</div>
