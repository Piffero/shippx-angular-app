<div class="timeline-container p-3">
  <h6 class="fw-bold mb-4 text-secondary text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px;">
    Histórico de Movimentação
  </h6>

  <div class="timeline">
    @for (event of timelineEvents(); track event.title; let isFirst = $first) {
      <div class="timeline-item d-flex pb-4 position-relative">
        <div class="timeline-line"></div>
        
        <div class="timeline-icon-container me-3">
          <div class="timeline-icon shadow-sm" [class.active]="isFirst">
            <i class="fa" [ngClass]="event.icon"></i>
          </div>
        </div>

        <div class="timeline-content">
          <div class="d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold" [class.text-primary]="isFirst">{{ event.title }}</h6>
            <span class="text-muted" style="font-size: 0.7rem;">
              {{ event.date | date:'dd/MM HH:mm' }}
            </span>
          </div>
          <p class="text-muted small mb-0 mt-1">{{ event.description }}</p>
        </div>
      </div>
    }
  </div>
</div>
