<div class="container py-4">
  <h2 class="mb-4">New Shipment</h2>

  <form [formGroup]="shipmentForm" (ngSubmit)="onContinue()">
    <div class="card shadow-sm border-0 p-4">
      <h5 class="fw-bold mb-3">LIST A SHIPMENT</h5>

      <div class="col-md-3 mb-4">
        <label class="form-label small fw-bold">NO. OF SHIPMENTS</label>
        <select class="form-select" formControlName="items_count">
          <option [value]="1">1</option>
          <option [value]="2">2</option>
          <option [value]="3">3</option>
          <option [value]="4">4</option>
          <option [value]="5">5</option>
        </select>
      </div>

      <div class="details-section p-3 mb-4 border-start border-primary border-4 bg-light">
        <h6 class="text-primary fw-bold pb-3">Item #1 Details</h6>
        
        @if (catId() === 'cat_veiculos_01') {
           <p>Interface de Veículos Carregada</p> 
        } @else {
           <div formGroupName="shippx_details">
              <div class="mb-3">
                <label class="small fw-bold">NAME</label>
                <input type="text" class="form-control" formControlName="name" placeholder="Item">
              </div>
              
              <div class="row g-2" formGroupName="dimensions">
                <label class="small fw-bold d-block pt-3 pb-3">Dimension</label>
                <div class="row">                    
                    <div class="col">
                        <label class="small d-block">Height</label>
                        <input type="number" class="form-control" formControlName="height" placeholder="in CM">
                    </div>
                    <div class="col">
                        <label class="small d-block">Width</label>
                        <input type="number" class="form-control" formControlName="width" placeholder="in CM">
                    </div>
                    <div class="col">
                        <label class="small d-block">Length</label>
                        <input type="number" class="form-control" formControlName="length" placeholder="in CM">
                    </div>
                    <div class="col">
                        <label class="small d-block">Weight</label>
                        <input type="number" class="form-control" formControlName="weight" placeholder="in KG"></div>
                </div>
                
              </div>
           </div>
        }
      </div>

      <div class="row mt-4">
        <div class="col-md-6" formGroupName="sender">
          <h6 class="fw-bold pb-3">Sender Information</h6>
          <label class="small d-block">Sender's Name</label>
          <input type="text" class="form-control mb-2" formControlName="name" placeholder="Sender's Name">
          <label class="small d-block">Mobile Number</label>
          <input type="text" class="form-control" formControlName="contact_number" placeholder="Mobile Number">
        </div>
        <div class="col-md-6" formGroupName="receiver">
          <h6 class="fw-bold pb-3">Receiver Information</h6>
          <label class="small d-block">Receiver's Name</label>
          <input type="text" class="form-control mb-2" formControlName="name" placeholder="Receiver's Name">
          <label class="small d-block">Mobile Number</label>
          <input type="text" class="form-control" formControlName="contact_number" placeholder="Mobile Number">
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-md-6" formGroupName="pickup_location">
          <h6 class="fw-bold pb-3">Pickup Location</h6>
          <div class="row">
            <div class="col-8">
                <label class="small d-block">Full Address</label>
                <input type="text" class="form-control" formControlName="city" placeholder="e.g. London">
            </div>
            <div class="col-4">
                <label class="small d-block">Address Type</label>
                <select class="form-select" formControlName="addressType">
                    <option [value]="'RESIDENTIAL'">RESIDENTIAL</option>
                    <option [value]="'COMMERCIAL'">COMMERCIAL</option>
                </select>
            </div>
          </div>
        </div>
        <div class="col-md-6" formGroupName="delivery_location">
          <h6 class="fw-bold pb-3">Delivery Location</h6>
          <div class="row">
            <div class="col-8">
                <label class="small d-block">Full Address</label>
                <input type="text" class="form-control" formControlName="city" placeholder="e.g. London">
            </div>
            <div class="col-4">
                <label class="small d-block">Address Type</label>
                <select class="form-select" formControlName="addressType">
                    <option [value]="'RESIDENTIAL'">RESIDENTIAL</option>
                    <option [value]="'COMMERCIAL'">COMMERCIAL</option>
                </select>
            </div>
          </div>          
        </div>
      </div>

      <div class="text-center mt-5">
        <button type="submit" class="btn btn-primary px-5 py-2">Continue</button>
      </div>
    </div>
  </form>
</div>
