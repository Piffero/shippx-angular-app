<div class="container py-5">
  <div class="header-info d-flex align-items-center p-3 mb-4 bg-light rounded-3 border">
    <i class="fa fa-lightbulb text-primary fs-3 me-3"></i>
    <div>
      <h6 class="fw-bold mb-1">How It Works</h6>
      <p class="small text-muted mb-0">book through our platform to save time and money.</p>
    </div>
  </div>

  <form [formGroup]="confirmForm" (ngSubmit)="onCreateShipment()">
    <div class="card shadow-sm border-0 p-4">
      <h5 class="fw-bold mb-4">SHIPMENT DETAILS</h5>

      <div class="mb-4">
        <label class="form-label small fw-bold text-uppercase">* Shipment Title</label>
        <input type="text" class="form-control form-control-lg" formControlName="shipment_title" placeholder="Ex: Mudança Apartamento Centro">
      </div>

      <div class="row mb-4">
        <h6 class="fw-bold">Pickup & Delivery Dates</h6>
        <div class="col-md-6">
          <label class="small text-muted">Pickup Date Range</label>
          <input type="date" class="form-control" formControlName="pickup_date">
        </div>
        <div class="col-md-6">
          <label class="small text-muted">Delivery Date Range</label>
          <input type="date" class="form-control" formControlName="delivery_date">
        </div>
      </div>

      <div class="mb-4">
        <h6 class="fw-bold">Service Type Options</h6>
        <div class="gap-4 mt-2">
          <div class="form-check custom-radio mb-2">
            <input class="form-check-input" type="radio" value="OPEN" formControlName="transport_type" id="open">
            <label class="d-flex form-check-label" for="open">
              Open Transport &nbsp;<img width="40px" src="/images/truck_open.png" alt="open">
            </label>
          </div>
          <div class="form-check custom-radio mb-2">
            <input class="form-check-input" type="radio" value="ENCLOSED" formControlName="transport_type" id="enclosed">
            <label class="d-flex  form-check-label" for="enclosed">
              Enclosed Transport &nbsp; <img width="40px" src="/images/truck_close.png" alt="open">
            </label>
          </div>
          <div class="form-check custom-radio mb-2">
            <input class="form-check-input" type="radio" value="REEFER" formControlName="transport_type" id="enclosed">
            <label class="d-flex  form-check-label" for="enclosed">
              Reefer Transport &nbsp; <img width="40px" src="/images/truck_reefer.png" alt="open">
            </label>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h6 class="fw-bold">SPECIAL INSTRUCTIONS</h6>
        <textarea class="form-control" rows="3" formControlName="special_instructions" 
                  placeholder="Use the alley, call before you arrive..."></textarea>
      </div>

      <div class="row">
        <h6 class="fw-bold">Reference Number (Optional)</h6>
        <div class="col-md-4">
          <select class="form-select" formControlName="reference_type">
            <option value="VIN">VIN</option>
            <option value="INVOICE">Invoice</option>
            <option value="ORDER_NUMBER">Order Number</option>
            <option value="OTHER">Other</option>
          </select>
        </div>
        <div class="col-md-8">
          <input type="text" class="form-control" formControlName="reference_code" placeholder="123456">
        </div>
      </div>

      <div class="text-center mt-5">
        <button type="submit" class="btn btn-primary btn-lg px-5 py-3 rounded-pill" [disabled]="loading()">
          @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Create Shipment
        </button>
      </div>
    </div>
  </form>
</div>
